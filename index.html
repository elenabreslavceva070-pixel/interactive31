<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Аванс & Выручка · компакт</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #eef2f7 0%, #e0e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Roboto', sans-serif;
            padding: 1rem;
        }

        .quiz-container {
            max-width: 720px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.2), 0 4px 12px rgba(0, 0, 0, 0.03);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .quiz-header {
            padding: 1.2rem 1.5rem 0.6rem 1.5rem;
            border-bottom: 1px solid rgba(149, 202, 250, 0.4);
            background: #fefefe;
        }

        .progress-area {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
        }

        .question-counter {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.2px;
            color: #2c3e50;
            background: #eef4fc;
            padding: 0.2rem 0.7rem;
            border-radius: 40px;
            display: inline-block;
        }

        .score-badge {
            font-size: 0.7rem;
            font-weight: 600;
            color: #1e4663;
            background: #eef4fc;
            padding: 0.2rem 0.7rem;
            border-radius: 40px;
        }

        h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1a2c3e;
            margin-top: 0.2rem;
            letter-spacing: -0.2px;
        }

        .question-area {
            padding: 1.2rem 1.5rem 0.8rem 1.5rem;
        }

        .question-text {
            font-size: 1.05rem;
            font-weight: 500;
            line-height: 1.3;
            color: #0b2b3f;
            margin-bottom: 1.2rem;
            border-left: 4px solid #95CAFA;
            padding-left: 1rem;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            margin-bottom: 1.2rem;
        }

        .option-item {
            border: 2px solid #95CAFA;
            border-radius: 1rem;
            padding: 0.6rem 1rem;
            background: #ffffff;
            transition: all 0.15s ease;
            cursor: pointer;
            display: flex;
            align-items: flex-start;
            gap: 0.8rem;
            font-size: 0.85rem;
            line-height: 1.3;
            color: #1f3b4c;
        }

        .option-item:hover {
            background: #f8fcff;
            border-color: #6fb0e0;
            transform: translateY(-1px);
            box-shadow: 0 4px 10px -8px rgba(0, 0, 0, 0.1);
        }

        .option-radio {
            appearance: none;
            -webkit-appearance: none;
            width: 1rem;
            height: 1rem;
            border: 2px solid #95CAFA;
            border-radius: 50%;
            margin-top: 0.1rem;
            position: relative;
            cursor: pointer;
            background: white;
            transition: 0.1s;
            flex-shrink: 0;
        }
        .option-radio:checked {
            border-color: #2c7ab1;
            background-color: #2c7ab1;
            box-shadow: inset 0 0 0 3px white;
        }
        .option-radio:focus {
            outline: none;
        }

        .option-text {
            flex: 1;
            font-weight: 500;
        }

        .option-item.correct-highlight {
            background-color: #e0f7e8;
            border-color: #2b8c5e;
        }
        .option-item.wrong-highlight {
            background-color: #ffe7e7;
            border-color: #d9534f;
        }

        .actions {
            padding: 0 1.5rem 1.2rem 1.5rem;
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            justify-content: flex-end;
            align-items: center;
        }

        button {
            font-family: inherit;
            font-weight: 600;
            font-size: 0.8rem;
            padding: 0.5rem 1.4rem;
            border-radius: 3rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            background: #f0f4f9;
            color: #1f4e6e;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .btn-primary {
            background: #2c7ab1;
            color: white;
            box-shadow: 0 4px 8px rgba(44,122,177,0.2);
        }
        .btn-primary:hover {
            background: #1f6190;
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: #eef2f7;
            border: 1px solid #cbdbe2;
        }
        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .explanation-box {
            margin: 0 1.5rem 0.8rem 1.5rem;
            background: #f9fdfe;
            border-radius: 1rem;
            padding: 0.8rem 1.2rem;
            border-left: 4px solid #95CAFA;
            font-size: 0.8rem;
            color: #1e4663;
            line-height: 1.4;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .result-screen {
            text-align: center;
            padding: 1.8rem 1.5rem 2rem;
        }

        .result-icon {
            font-size: 2.4rem;
            margin-bottom: 0.3rem;
        }

        .result-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            color: #1a2c3e;
        }

        .result-message {
            font-size: 0.95rem;
            margin-bottom: 1.2rem;
            color: #2c3e50;
        }

        .result-score {
            font-size: 1.1rem;
            font-weight: 600;
            background: #eef4fc;
            display: inline-block;
            padding: 0.3rem 1.2rem;
            border-radius: 60px;
            margin-bottom: 1.5rem;
            color: #1f6190;
        }

        hr {
            margin: 0.6rem 1.5rem;
            border: none;
            border-top: 1px solid #e2edf5;
        }

        @media (max-width: 480px) {
            .quiz-container { border-radius: 1.6rem; }
            .question-text { font-size: 0.95rem; }
            .option-item { padding: 0.5rem 0.8rem; font-size: 0.8rem; }
            button { padding: 0.4rem 1rem; font-size: 0.75rem; }
            .actions { flex-direction: column; align-items: stretch; }
            .btn-primary, .btn-secondary { justify-content: center; display: flex; }
            .quiz-header { padding: 0.8rem 1rem 0.4rem 1rem; }
            .question-area { padding: 0.8rem 1rem 0.4rem 1rem; }
            .explanation-box { margin: 0 1rem 0.6rem 1rem; font-size: 0.75rem; padding: 0.6rem 1rem; }
        }
    </style>
</head>
<body>

<div class="quiz-container" id="app"></div>

<script>
    // ----- ВОПРОСЫ (3 шт) -----
    const QUESTIONS = [
        {
            text: "1. Ваша компания получила аванс в декабре, а продукцию отгрузила в январе следующего года. Как вы отразите аванс в отчетности?",
            options: [
                "Как прочий доход текущего периода",
                "Как выручка текущего периода",
                "Как кредиторскую задолженность"
            ],
            correctIndex: 2,
            explanation: "Отражаем как аванс Кредит 62.02 в случае, если договор подлежит учету в бухгалтерском учете п.9 ФСБУ 9. Если нет, признаем как кредиторскую задолженность, не связанную с выручкой."
        },
        {
            text: "2. Вы предоставили покупателю скидку за досрочную оплату. Как по упрощенному методу вы учтете такую скидку?",
            options: [
                "Сразу уменьшу выручку на 2 %",
                "Учту скидку, как финансовые расходы",
                "Уменьшу выручку в момент оплаты"
            ],
            correctIndex: 2,
            explanation: "Вы признаете выручку в сумме, которая поступила от покупателя на расчетный счет. У вас нет необходимости заранее оценивать вероятность досрочной оплаты."
        },
        {
            text: "3. Ваша компания выполняет работы по долгосрочному договору: заказчик платит авансы по графику, а окончательный расчет — после того, как проект завершите. Доход вы признаете после того, как подпишете акты. Какой риск возникает при таком подходе?",
            options: [
                "Риск исказить данные бухгалтерской отчетности",
                "Риск необходимости дисконтировать аванс",
                "Риск занизить расходы"
            ],
            correctIndex: 0,
            explanation: "Если по долгосрочному договору вы признаете выручку только в конце работ, возникает риск исказить бухгалтерскую отчетность. В первые периоды вы занизите показатели, хотя работы уже выполняете и деньги за них поступают. В последнем периоде произойдет резкий рост выручки и прибыли. При этом наличие промежуточных актов само по себе не означает, что именно на их основании вы признаете выручку. Главное — определить момент передачи контроля. Именно этот момент определяет, когда выручку вы отразите в учете."
        }
    ];

    // Состояние
    let currentState = {
        phase: 'quiz',          // 'quiz', 'explanation'
        currentQuestionIdx: 0,
        userAnswers: new Array(QUESTIONS.length).fill(null), // массив фиксированной длины
        explanationForCurrent: null,
        isAnswerChecked: false,
        selectedOptionTemp: null,
        totalQuestions: QUESTIONS.length
    };

    const appContainer = document.getElementById('app');

    function recordCurrentAnswer() {
        const idx = currentState.currentQuestionIdx;
        const selected = currentState.selectedOptionTemp;
        if (selected === null) return false;
        const isCorrect = (selected === QUESTIONS[idx].correctIndex);
        currentState.userAnswers[idx] = { selectedIdx: selected, isCorrect: isCorrect };
        return true;
    }

    function getCorrectCount() {
        let correct = 0;
        for (let i = 0; i < currentState.userAnswers.length; i++) {
            if (currentState.userAnswers[i] && currentState.userAnswers[i].isCorrect) correct++;
        }
        return correct;
    }

    function allQuestionsAnswered() {
        // Проверяем, что все вопросы отвечены (не null)
        return currentState.userAnswers.every(a => a !== null);
    }

    function showFinalResult() {
        const correctCount = getCorrectCount();
        const total = QUESTIONS.length;
        const allCorrect = (correctCount === total);
        
        let icon = allCorrect ? '🏆✨' : '📊';
        let title = allCorrect ? 'Молодец!' : 'Ваш результат';
        
        const resultHtml = `
            <div class="quiz-header">
                <div class="progress-area">
                    <span class="question-counter">Итог</span>
                    <span class="score-badge">${correctCount}/${total} баллов</span>
                </div>
                <h2></h2>
            </div>
            <div class="result-screen">
                <div class="result-icon">${icon}</div>
                <div class="result-title">${title}</div>
                <div class="result-score">Вы набрали ${correctCount} из ${total} баллов</div>
                <div class="result-message">${allCorrect ? 'Отличный результат! Все ответы верны.' : 'Попробуйте пройти тест заново, чтобы улучшить результат.'}</div>
                <button class="btn-primary" id="restartBtn" style="padding: 0.6rem 1.8rem; font-size:0.85rem;">Пройти заново</button>
            </div>
        `;
        
        appContainer.innerHTML = resultHtml;
        document.getElementById('restartBtn')?.addEventListener('click', resetAndRestart);
    }
    
    function handleNext() {
        const nextIdx = currentState.currentQuestionIdx + 1;
        if (nextIdx >= QUESTIONS.length) {
            showFinalResult();
            return;
        }
        currentState.currentQuestionIdx = nextIdx;
        currentState.phase = 'quiz';
        currentState.isAnswerChecked = false;
        currentState.explanationForCurrent = null;
        const saved = currentState.userAnswers[nextIdx];
        currentState.selectedOptionTemp = saved ? saved.selectedIdx : null;
        render();
    }

    function handleCheck() {
        if (currentState.isAnswerChecked) return;
        const selected = currentState.selectedOptionTemp;
        if (selected === null) {
            alert("Пожалуйста, выберите один из вариантов ответа.");
            return;
        }
        const idx = currentState.currentQuestionIdx;
        const isCorrect = (selected === QUESTIONS[idx].correctIndex);
        currentState.userAnswers[idx] = { selectedIdx: selected, isCorrect: isCorrect };
        currentState.isAnswerChecked = true;
        currentState.explanationForCurrent = QUESTIONS[idx].explanation;
        currentState.phase = 'explanation';
        render();
    }

    function resetAndRestart() {
        currentState = {
            phase: 'quiz',
            currentQuestionIdx: 0,
            userAnswers: new Array(QUESTIONS.length).fill(null),
            explanationForCurrent: null,
            isAnswerChecked: false,
            selectedOptionTemp: null,
            totalQuestions: QUESTIONS.length
        };
        render();
    }

    function selectOption(optionIndex) {
        if (currentState.phase !== 'quiz') return;
        if (currentState.isAnswerChecked) return;
        currentState.selectedOptionTemp = optionIndex;
        render();
    }

    function render() {
        if (!appContainer) return;
        
        // Проверяем, все ли вопросы отвечены и переходим к финальному экрану
        if (allQuestionsAnswered() && currentState.phase === 'quiz' && currentState.currentQuestionIdx >= QUESTIONS.length) {
            showFinalResult();
            return;
        }
        
        // Если все вопросы отвечены, но мы на финальном вопросе в режиме explanation, ничего не делаем
        if (allQuestionsAnswered() && currentState.phase === 'explanation' && currentState.currentQuestionIdx === QUESTIONS.length - 1) {
            // Показываем финальный экран только после нажатия "Далее" на последнем вопросе
            // или если пользователь перезагрузил страницу
        }
        
        const total = QUESTIONS.length;
        const qIdx = currentState.currentQuestionIdx;
        
        // Защита от выхода за границы
        if (qIdx >= total) {
            showFinalResult();
            return;
        }
        
        const question = QUESTIONS[qIdx];
        const isCheckedPhase = (currentState.phase === 'explanation');
        const savedAnswer = currentState.userAnswers[qIdx];
        const selectedIdx = currentState.selectedOptionTemp;
        
        let highlightMap = {};
        if (isCheckedPhase && savedAnswer) {
            const correctIdx = question.correctIndex;
            const userSelected = savedAnswer.selectedIdx;
            highlightMap[correctIdx] = 'correct';
            if (userSelected !== correctIdx) {
                highlightMap[userSelected] = 'wrong';
            }
        }
        
        let optionsHtml = '';
        question.options.forEach((opt, idx) => {
            let additionalClass = '';
            if (highlightMap[idx] === 'correct') additionalClass = 'correct-highlight';
            if (highlightMap[idx] === 'wrong') additionalClass = 'wrong-highlight';
            const isCheckedAttr = (selectedIdx === idx) ? 'checked' : '';
            const disabledAttr = (isCheckedPhase) ? 'disabled' : '';
            optionsHtml += `
                <div class="option-item ${additionalClass}" data-opt-index="${idx}">
                    <input type="radio" name="questionOption" class="option-radio" value="${idx}" id="opt_${idx}" ${isCheckedAttr} ${disabledAttr}>
                    <label for="opt_${idx}" class="option-text" style="cursor:pointer; flex:1;">${escapeHtml(opt)}</label>
                </div>
            `;
        });
        
        let explanationBlock = '';
        if (currentState.phase === 'explanation' && currentState.explanationForCurrent) {
            explanationBlock = `
                <div class="explanation-box">
                    <strong>📖 Пояснение</strong><br>
                    ${escapeHtml(currentState.explanationForCurrent)}
                </div>
            `;
        }
        
        let actionButtons = '';
        if (currentState.phase === 'quiz') {
            actionButtons = `
                <div class="actions">
                    <button class="btn-primary" id="checkBtn">✓ Проверить</button>
                </div>
            `;
        } else {
            const isLast = (qIdx === total - 1);
            const buttonText = isLast ? 'Завершить 🎯' : 'Далее →';
            actionButtons = `
                <div class="actions">
                    <button class="btn-primary" id="nextBtn">${buttonText}</button>
                </div>
            `;
        }
        
        const answeredCount = currentState.userAnswers.filter(a => a !== null).length;
        
        const headerHtml = `
            <div class="quiz-header">
                <div class="progress-area">
                    <span class="question-counter">Вопрос ${qIdx+1} из ${total}</span>
                    <span class="score-badge">✅ ${answeredCount}/${total} отвечено</span>
                </div>
                <h2>${isCheckedPhase ? 'Результат' : 'Выберите правильный ответ'}</h2>
            </div>
            <div class="question-area">
                <div class="question-text">${escapeHtml(question.text)}</div>
                <div class="options-list" id="optionsContainer">
                    ${optionsHtml}
                </div>
            </div>
            ${explanationBlock}
            ${actionButtons}
        `;
        
        appContainer.innerHTML = headerHtml;
        
        // клики по option-item
        document.querySelectorAll('.option-item').forEach(div => {
            const radio = div.querySelector('.option-radio');
            if (radio && !radio.disabled) {
                div.addEventListener('click', (e) => {
                    const idxAttr = div.getAttribute('data-opt-index');
                    if (idxAttr !== null && currentState.phase === 'quiz' && !currentState.isAnswerChecked) {
                        const idxNum = parseInt(idxAttr, 10);
                        selectOption(idxNum);
                        const radioInside = div.querySelector('.option-radio');
                        if (radioInside) radioInside.checked = true;
                    }
                });
            }
        });
        
        // радио
        document.querySelectorAll('.option-radio').forEach(radio => {
            radio.addEventListener('change', (e) => {
                if (currentState.phase === 'quiz' && !currentState.isAnswerChecked) {
                    const val = parseInt(e.target.value, 10);
                    selectOption(val);
                }
            });
        });
        
        document.getElementById('checkBtn')?.addEventListener('click', handleCheck);
        document.getElementById('nextBtn')?.addEventListener('click', handleNext);
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Инициализация
    render();
</script>
</body>
</html>
